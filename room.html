<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>احجز الآن - واحة الكلاب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">واحة الكلاب</a>
    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="about.html">الخدمات</a>
        <a href="room.html" class="active">احجز الان</a>
        <a href="backges.html">البكجات</a>
        <a href="booking.html">اتصل بنا</a>
    </nav>
</header>
<div class="floating-zoom-controls">
    <button type="button" class="zoom-btn plus" onclick="updateZoom('plus')" title="تكبير">+</button>
    <button type="button" class="zoom-btn minus" onclick="updateZoom('minus')" title="تصغير">−</button>
    <button type="button" class="reset-zoom-btn" onclick="resetZoom()">إعادة ضبط</button>
</div>
<section class="hero" style="height: 30vh; margin-bottom: 20px;">
    <div class="hero-content">
        <h1>احجز إقامة لكلبك</h1>
        <p>نقدم خدمات رعاية فاخرة في مدينة هونغ كونغ تليق بحيوانكم الأليف.</p>
    </div>
</section>

<section class="booking">
    <div class="contact-container" style="max-width: 700px;">
        <h2 style="font-size: 2rem; margin-bottom: 30px;">نموذج الحجز</h2>

        <form>
            <div class="form-group">
                <label>اسم المالك</label>
                <input type="text" placeholder="أدخل اسمك الكريم" required>
            </div>

            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" placeholder="+852 ...." required>
            </div>

            <div class="form-group">
                <label>اسم الكلب</label>
                <input type="text" placeholder="ما هو اسم صديقك الوفي؟" required>
            </div>

            <div class="form-group">
                <label>نوع الخدمة</label>
                <select style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-family: inherit;">
                    <option>إقامة فاخرة</option>
                    <option>حلاقة</option>
                    <option>منتجع</option>
                    <option>رعاية بيطرية</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>تاريخ الوصول</label>
                    <input type="date" required>
                </div>

                <div class="form-group">
                    <label>تاريخ المغادرة</label>
                    <input type="date" required>
                </div>
            </div>

            <div class="form-group">
                <label>ملاحظات إضافية</label>
                <textarea rows="4" placeholder="هل هناك أي تفاصيل خاصة تود إخبارنا بها؟"></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%; border-radius: 10px;">إرسال طلب الحجز</button>
        </form>
    </div>
</section>

<footer>
    <p>جميع الحقوق محفوظة © 2026 - واحة الكلاب RAMA OBEIDAT</p>
</footer>

<script src="Script.js"></script>
</body>
</html>
