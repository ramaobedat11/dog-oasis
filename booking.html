<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - واحة الكلاب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">واحة الكلاب</a>
    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="about.html">الخدمات</a>
        <a href="room.html">احجز الان</a>
        <a href="backges.html">البكجات</a>
        <a href="booking.html" class="active">اتصل بنا</a>
    </nav>
</header>
<div class="zoom-box">
    <button type="button" onclick="updateZoom('plus')">تكبير +</button>
    <button type="button" onclick="updateZoom('minus')">تصغير -</button>
    <button type="button" onclick="resetZoom()">إعادة ضبط</button>
</div>
<section class="hero" style="height: 30vh; margin-bottom: 20px;">
    <div class="hero-content">
        <h1>تواصل معنا</h1>
        <p>نحن هنا للإجابة على جميع استفساراتكم وخدمة عملائنا في هونغ كونغ.</p>
    </div>
</section>

<section class="contact">
    <div class="contact-container">
        <h2>أرسل لنا رسالة</h2>
        <form>
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" placeholder="أدخل اسمك" required>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" placeholder="+852 ....">
            </div>

            <div class="form-group">
                <label>رسالتك</label>
                <textarea rows="5" placeholder="اكتب رسالتك هنا..." required></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%; border-radius: 10px;">إرسال الرسالة</button>
        </form>

        <div style="margin-top: 40px; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
            <p><strong>📍 الموقع:</strong> *********** </p>
            <p><strong>📞 الهاتف:</strong> ***********</p>
            <p><strong>📧 البريد:</strong> ***********</p>
            <p><strong>⏰ ساعات العمل:</strong> متاح 24</p>
        </div>
    </div>
</section>

<footer>
    <p>جميع الحقوق محفوظة © 2026 - واحة الكلاب RAMA OBEIDAT</p>
</footer>

<script src="Script.js"></script>
<script>
    
    var currentSize = 100;

    function updateZoom(action) {
        if (action === 'plus') {
            currentSize += 10;
        } else if (action === 'minus') {
            currentSize -= 10;
        }

          
        if (currentSize > 160) currentSize = 160;
        if (currentSize < 70) currentSize = 70;

        
        document.documentElement.style.setProperty('font-size', currentSize + '%', 'important');
        
        console.log("الحجم الحالي: " + currentSize + "%");
    }

    function resetZoom() {
        currentSize = 100;
        document.documentElement.style.setProperty('font-size', '100%', 'important');
    }
</script>
</body>
</html>
